<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YO CODE BLOX - Roblox Specialist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050506; color: #e2e8f0; margin: 0; overflow: hidden; }
        .code-font { font-family: 'Fira Code', monospace; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        .scanline { position: absolute; width: 100%; height: 2px; background: rgba(59, 130, 246, 0.1); animation: scanline 4s linear infinite; pointer-events: none; }
        
        .animate-up { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [username, setUsername] = useState('');
            const [isLogged, setIsLogged] = useState(false);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [isSidebarOpen, setSidebarOpen] = useState(false);
            const [activeScript, setActiveScript] = useState(null);
            const [copied, setCopied] = useState(false);
            const chatRef = useRef(null);

            // Auto-scroll otimizado
            useEffect(() => {
                if (chatRef.current) {
                    chatRef.current.scrollTo({
                        top: chatRef.current.scrollHeight,
                        behavior: 'smooth'
                    });
                }
            }, [messages, isLoading]);

            const copyToClipboard = (text) => {
                try {
                    const el = document.createElement('textarea');
                    el.value = text;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch (err) {
                    console.error("Erro ao copiar:", err);
                }
            };

            const callGemini = async (prompt, retries = 0) => {
                const apiKey = ""; // Injetado automaticamente pelo ambiente
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const systemPrompt = `Você é o "YO CODE BLOX", uma Inteligência Artificial de elite especializada exclusivamente em Roblox Studio e na linguagem Luau.
                Sua missão é ajudar desenvolvedores mobile e desktop a criar sistemas eficientes, otimizados e seguros.

                REGRAS INVIOLÁVEIS:
                1. NUNCA mencione ou gere código em C#, Python, Unity ou qualquer tecnologia fora do ecossistema Roblox.
                2. Responda SEMPRE em Português de Portugal (PT-PT).
                3. O formato da resposta deve ser ESTRITAMENTE um JSON válido.
                4. Se o utilizador pedir algo impossível ou ofensivo, explique brevemente no campo "explanation" e deixe "script" como null.

                ESTRUTURA JSON OBRIGATÓRIA:
                {
                    "explanation": "Uma explicação técnica curta e profissional sobre como o sistema funciona.",
                    "script": {
                        "name": "NomeDoScript",
                        "location": "Onde colocar (ex: ServerScriptService, StarterPlayerScripts)",
                        "code": "-- Código Luau completo, comentado e pronto a usar"
                    }
                }`;

                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { 
                                responseMimeType: "application/json",
                                temperature: 0.7
                            }
                        })
                    });

                    if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
                    
                    const data = await res.json();
                    const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (!rawText) throw new Error("Resposta vazia da API");
                    
                    return JSON.parse(rawText);
                } catch (err) {
                    if (retries < 5) {
                        const delay = Math.pow(2, retries) * 1000;
                        await new Promise(r => setTimeout(r, delay));
                        return callGemini(prompt, retries + 1);
                    }
                    throw err;
                }
            };

            const handleSend = async (e) => {
                e.preventDefault();
                if (!input.trim() || isLoading) return;

                const userMsg = { role: 'user', content: input };
                setMessages(prev => [...prev, userMsg]);
                const currentInput = input;
                setInput('');
                setIsLoading(true);

                try {
                    const result = await callGemini(currentInput);
                    setMessages(prev => [...prev, { 
                        role: 'assistant', 
                        content: result.explanation, 
                        script: result.script 
                    }]);
                    if (result.script) setActiveScript(result.script);
                } catch (error) {
                    setMessages(prev => [...prev, { 
                        role: 'assistant', 
                        content: "Ocorreu um erro ao processar o teu pedido. Verifica a tua ligação ou tenta novamente mais tarde." 
                    }]);
                } finally {
                    setIsLoading(false);
                }
            };

            if (!isLogged) {
                return (
                    <div className="h-screen w-full flex items-center justify-center p-6 bg-[#020203]">
                        <div className="scanline"></div>
                        <div className="w-full max-w-sm glass p-10 rounded-[3rem] text-center relative z-10 shadow-2xl">
                            <div className="mb-8">
                                <h1 className="text-6xl font-black italic tracking-tighter text-white">YO</h1>
                                <p className="text-[10px] font-bold text-blue-500 uppercase tracking-[0.4em] mt-2">Code Blox Studio</p>
                            </div>
                            <form onSubmit={(e) => { e.preventDefault(); if(username.trim()) setIsLogged(true); }}>
                                <input 
                                    className="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white text-center outline-none focus:border-blue-500 transition-all mb-4 text-sm"
                                    placeholder="NOME DE UTILIZADOR"
                                    value={username}
                                    onChange={e => setUsername(e.target.value.toUpperCase())}
                                    autoFocus
                                />
                                <button className="w-full py-4 rounded-2xl bg-blue-600 text-white font-black uppercase text-[11px] tracking-widest active:scale-95 transition-transform shadow-lg shadow-blue-600/20">
                                    Aceder ao Workspace
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen w-full relative bg-[#050506]">
                    {/* Sidebar */}
                    <aside className={`fixed lg:relative z-50 h-full bg-[#080809] border-r border-white/5 transition-all duration-300 ${isSidebarOpen ? 'w-[280px]' : 'w-0 lg:w-[320px]'} overflow-hidden`}>
                        <div className="w-[280px] lg:w-full flex flex-col h-full">
                            <div className="p-8 border-b border-white/5 flex items-center justify-between">
                                <h2 className="text-xl font-black italic text-white tracking-tighter">YO BLOX</h2>
                                <button onClick={() => setSidebarOpen(false)} className="lg:hidden text-zinc-500 hover:text-white">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
                                </button>
                            </div>
                            <div className="flex-1 p-6 overflow-y-auto space-y-2 no-scrollbar">
                                <p className="text-[9px] font-black text-zinc-600 uppercase tracking-widest mb-4">Scripts Gerados</p>
                                {messages.filter(m => m.script).map((m, i) => (
                                    <button 
                                        key={i} 
                                        onClick={() => { setActiveScript(m.script); if(window.innerWidth < 1024) setSidebarOpen(false); }} 
                                        className="w-full flex items-center gap-3 p-3 rounded-xl bg-white/5 border border-white/5 text-[10px] font-bold text-zinc-400 uppercase truncate hover:bg-white/10 hover:text-white transition-all"
                                    >
                                        <svg className="shrink-0" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>
                                        {m.script.name}
                                    </button>
                                ))}
                            </div>
                            <div className="p-8 border-t border-white/5 bg-black/40">
                                <div className="flex items-center gap-4">
                                    <div className="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center font-black text-white text-xs shadow-lg">{username[0]}</div>
                                    <div className="overflow-hidden">
                                        <p className="text-[10px] font-black text-white uppercase truncate">{username}</p>
                                        <p className="text-[8px] font-bold text-blue-500 uppercase">Dev Mode On</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* Main Workspace */}
                    <main className="flex-1 flex flex-col relative overflow-hidden">
                        <header className="h-16 lg:h-20 border-b border-white/5 flex items-center px-6 lg:px-10 justify-between bg-black/20 backdrop-blur-md z-20">
                            <button onClick={() => setSidebarOpen(true)} className={`lg:hidden text-zinc-400 ${isSidebarOpen ? 'opacity-0' : 'opacity-100'}`}>
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                            </button>
                            <div className="flex items-center gap-2">
                                <div className="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></div>
                                <span className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Luau Engine v2.5</span>
                            </div>
                            <button onClick={() => setIsLogged(false)} className="text-[9px] font-black text-zinc-600 uppercase hover:text-red-500 transition-colors">Encerrar</button>
                        </header>

                        {/* Chat Messages */}
                        <div ref={chatRef} className="flex-1 overflow-y-auto p-6 lg:p-12 space-y-8 no-scrollbar scroll-smooth">
                            {messages.length === 0 && (
                                <div className="h-full flex flex-col items-center justify-center opacity-10 grayscale pointer-events-none text-center">
                                    <h1 className="text-8xl lg:text-9xl font-black italic tracking-tighter text-white">YO</h1>
                                    <p className="text-[10px] font-bold uppercase tracking-[1.5em] text-white">Roblox Specialist</p>
                                </div>
                            )}
                            {messages.map((m, i) => (
                                <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-up`}>
                                    <div className={`max-w-[90%] lg:max-w-[75%] p-6 rounded-[2rem] shadow-xl ${m.role === 'user' ? 'bg-blue-600 text-white' : 'glass text-zinc-300'}`}>
                                        <p className="text-xs lg:text-sm leading-relaxed whitespace-pre-wrap">{m.content}</p>
                                        {m.script && (
                                            <button 
                                                onClick={() => setActiveScript(m.script)}
                                                className="mt-6 w-full py-4 bg-black/40 border border-white/10 rounded-2xl flex items-center justify-center gap-3 text-[10px] font-black uppercase tracking-widest hover:border-blue-500/50 hover:bg-black/60 transition-all group"
                                            >
                                                <svg className="group-hover:scale-110 transition-transform" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" strokeWidth="3"><path d="M16 18l6-6-6-6M8 6l-6 6 6 6"/></svg>
                                                Abrir Editor Luau
                                            </button>
                                        )}
                                    </div>
                                </div>
                            ))}
                            {isLoading && (
                                <div className="flex items-center gap-3 text-blue-500 font-black text-[9px] uppercase tracking-widest">
                                    <svg className="animate-spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                                    A processar lógica...
                                </div>
                            )}
                        </div>

                        {/* Input Area */}
                        <div className="p-6 lg:p-10 border-t border-white/5 bg-[#080809]/80 backdrop-blur-xl">
                            <form onSubmit={handleSend} className="max-w-4xl mx-auto relative group">
                                <input 
                                    className="w-full bg-[#111112] border border-white/10 rounded-2xl lg:rounded-[2.5rem] px-8 py-5 lg:py-7 pr-20 outline-none focus:border-blue-600 transition-all text-sm placeholder:text-zinc-600 text-white"
                                    placeholder="Ex: Faz um sistema de inventário circular..."
                                    value={input}
                                    onChange={e => setInput(e.target.value)}
                                    disabled={isLoading}
                                />
                                <button 
                                    disabled={isLoading || !input.trim()}
                                    className="absolute right-3 top-1/2 -translate-y-1/2 w-12 h-12 lg:w-14 lg:h-14 bg-white text-black rounded-xl lg:rounded-full flex items-center justify-center hover:bg-blue-600 hover:text-white disabled:opacity-50 disabled:grayscale transition-all active:scale-90"
                                >
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                                </button>
                            </form>
                            <p className="text-center text-[8px] text-zinc-700 uppercase font-bold mt-4 tracking-tighter">AI pode gerar erros. Revise sempre o código no Roblox Studio.</p>
                        </div>
                    </main>

                    {/* Editor / Script Viewer Overlay */}
                    {activeScript && (
                        <div className="fixed inset-0 z-[100] flex items-end lg:items-center justify-center bg-black/95 backdrop-blur-xl p-0 lg:p-10 animate-up">
                            <div className="w-full max-w-5xl h-[90vh] lg:h-[85vh] bg-[#0a0a0b] border border-white/10 rounded-t-[3rem] lg:rounded-[3.5rem] flex flex-col shadow-2xl overflow-hidden relative">
                                <div className="p-8 lg:p-10 border-b border-white/5 flex items-center justify-between bg-white/2">
                                    <div>
                                        <div className="flex items-center gap-2 mb-1">
                                            <div className="w-2 h-2 rounded-full bg-green-500"></div>
                                            <h3 className="text-xs font-black text-white uppercase tracking-tighter">{activeScript.name}</h3>
                                        </div>
                                        <p className="text-[9px] font-bold text-blue-500 uppercase tracking-widest">Localização sugerida: {activeScript.location}</p>
                                    </div>
                                    <div className="flex gap-3">
                                        <button 
                                            onClick={() => copyToClipboard(activeScript.code)}
                                            className="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-[9px] font-black uppercase tracking-widest flex items-center gap-2 transition-all active:scale-95 shadow-lg shadow-blue-600/20"
                                        >
                                            {copied ? (
                                                <React.Fragment>
                                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M20 6L9 17l-5-5"/></svg>
                                                    Copiado!
                                                </React.Fragment>
                                            ) : (
                                                <React.Fragment>
                                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2M16 4h2a2 2 0 0 1 2 2v4M8 4v4h8V4M8 4h8"/></svg>
                                                    Copiar Código
                                                </React.Fragment>
                                            )}
                                        </button>
                                        <button onClick={() => setActiveScript(null)} className="p-3 text-zinc-500 hover:text-white transition-colors">
                                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
                                        </button>
                                    </div>
                                </div>
                                <div className="flex-1 overflow-auto p-8 lg:p-12 bg-black/20">
                                    <pre className="code-font text-[11px] lg:text-sm text-blue-100/90 leading-relaxed tab-size-4">
                                        <code>{activeScript.code}</code>
                                    </pre>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
