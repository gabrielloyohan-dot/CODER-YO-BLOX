<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YO CODE STUDIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        .animate-slide-in { animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .custom-shadow { shadow-lg; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Firebase Mock/Stub - Substitua com seus imports reais se necessário
        // Para rodar no GitHub Pages, usamos a lógica do ambiente Canvas simplificada
        const appId = "yo-code-studio-v1";
        const apiKey = ""; 

        function App() {
            const [user, setUser] = useState(null);
            const [userData, setUserData] = useState({ 
                name: 'Guest', 
                theme: 'dark', 
                systemPrompt: "Você é o YO CODE AI. Gere scripts Luau Roblox profissionais. Responda APENAS JSON: {\"explanation\":\"...\",\"scriptUpdate\":{\"name\":\"Nome do Script\",\"location\":\"Onde colocar (Ex: Workspace)\",\"code\":\"-- codigo\"}}" 
            });
            const [chats, setChats] = useState([]);
            const [activeChatId, setActiveChatId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isSending, setIsSending] = useState(false);
            const [isEditorOpen, setIsEditorOpen] = useState(false);
            const [activeScript, setActiveScript] = useState(null);
            const [isLoginModal, setIsLoginModal] = useState(true);
            const [isProfileModal, setIsProfileModal] = useState(false);
            const [tempName, setTempName] = useState('');
            
            const chatRef = useRef(null);

            // Carregar dados locais (Simulando persistência básica para o index.html)
            useEffect(() => {
                const saved = localStorage.getItem('yo_studio_user');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    setUserData(parsed);
                    setUser({ uid: 'local-user' });
                    setIsLoginModal(false);
                }
            }, []);

            useEffect(() => {
                if (userData) localStorage.setItem('yo_studio_user', JSON.stringify(userData));
            }, [userData]);

            useEffect(() => { chatRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

            const handleLogin = () => {
                if (!tempName.trim()) return;
                const newUser = { ...userData, name: tempName };
                setUserData(newUser);
                setUser({ uid: 'local-user' });
                setIsLoginModal(false);
                createChat("Projeto Inicial");
            };

            const createChat = (name) => {
                const newChat = { id: Date.now().toString(), name: name || "Novo Chat", ts: Date.now() };
                setChats([newChat, ...chats]);
                setActiveChatId(newChat.id);
                setMessages([]);
            };

            const onSend = async (e) => {
                e.preventDefault();
                if (!input.trim() || isSending) return;
                
                const userMsg = { role: 'user', content: input, sender: userData.name };
                setMessages(prev => [...prev, userMsg]);
                setInput('');
                setIsSending(true);

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: input }] }],
                            systemInstruction: { parts: [{ text: userData.systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    
                    const data = await res.json();
                    const result = JSON.parse(data.candidates[0].content.parts[0].text);

                    setMessages(prev => [...prev, { 
                        role: 'bot', 
                        content: result.explanation, 
                        script: result.scriptUpdate 
                    }]);
                } catch (err) {
                    setMessages(prev => [...prev, { role: 'bot', content: "Erro ao conectar com a IA. Verifique sua chave API ou conexão." }]);
                }
                setIsSending(false);
            };

            const isDark = userData.theme === 'dark';

            if (isLoginModal) return (
                <div className="h-screen bg-[#050505] flex items-center justify-center p-6 text-white">
                    <div className="w-full max-w-sm bg-[#0d0d0e] p-10 rounded-[3rem] border border-white/5 text-center shadow-2xl">
                        <h1 className="text-4xl font-black italic mb-2 tracking-tighter">YO STUDIO</h1>
                        <p className="text-[10px] font-bold text-zinc-600 uppercase mb-10 tracking-[0.3em]">Acesso ao Sistema</p>
                        <input 
                            value={tempName} 
                            onChange={e => setTempName(e.target.value)}
                            placeholder="Seu Nome" 
                            className="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white text-center outline-none focus:border-blue-500 mb-4" 
                        />
                        <button onClick={handleLogin} className="w-full bg-white text-black font-black py-4 rounded-2xl hover:bg-blue-600 hover:text-white transition-all uppercase text-xs">Entrar no Studio</button>
                    </div>
                </div>
            );

            return (
                <div className={`flex h-screen transition-colors duration-300 ${isDark ? 'bg-[#050505] text-zinc-400' : 'bg-zinc-50 text-zinc-600'}`}>
                    
                    {/* Sidebar */}
                    <aside className={`w-80 border-r flex flex-col transition-colors ${isDark ? 'bg-[#080809] border-white/5' : 'bg-white border-zinc-200'}`}>
                        <div className={`p-8 border-b flex justify-between items-center ${isDark ? 'border-white/5' : 'border-zinc-200'}`}>
                            <div>
                                <h2 className={`text-xl font-black italic tracking-tighter ${isDark ? 'text-white' : 'text-zinc-900'}`}>YO STUDIO</h2>
                                <p className="text-[9px] font-bold text-blue-500 uppercase tracking-widest">Workspace Online</p>
                            </div>
                            <button onClick={() => createChat()} className={`p-3 rounded-2xl transition-all ${isDark ? 'bg-white/5 text-white hover:bg-blue-600' : 'bg-zinc-100 text-zinc-900 hover:bg-blue-600 hover:text-white'}`}>
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M12 5v14M5 12h14"/></svg>
                            </button>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 space-y-2">
                            <p className="text-[9px] font-black uppercase text-zinc-500 px-4 mb-4 tracking-widest">Chats</p>
                            {chats.map(c => (
                                <div 
                                    key={c.id} 
                                    onClick={() => setActiveChatId(c.id)}
                                    className={`p-4 rounded-2xl cursor-pointer transition-all ${activeChatId === c.id ? 'bg-blue-600 text-white shadow-lg' : isDark ? 'hover:bg-white/5' : 'hover:bg-zinc-100'}`}
                                >
                                    <span className="text-[11px] font-bold uppercase truncate">{c.name}</span>
                                </div>
                            ))}
                        </div>

                        <div onClick={() => setIsProfileModal(true)} className={`p-6 border-t flex items-center gap-3 cursor-pointer ${isDark ? 'bg-black border-white/5 hover:bg-zinc-900' : 'bg-white border-zinc-200 hover:bg-zinc-50'}`}>
                            <div className="w-10 h-10 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-[10px] font-black text-white italic">YO</div>
                            <div className="flex-1 overflow-hidden">
                                <p className={`text-[11px] font-black leading-none mb-1 uppercase truncate ${isDark ? 'text-white' : 'text-zinc-900'}`}>{userData.name}</p>
                                <p className="text-[8px] text-zinc-500 uppercase font-black tracking-widest">Ajustes</p>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col relative overflow-hidden">
                        {!activeChatId ? (
                            <div className="flex-1 flex flex-col items-center justify-center opacity-10">
                                <h1 className="text-[10rem] font-black italic tracking-tighter">YO</h1>
                            </div>
                        ) : (
                            <>
                                <header className={`h-20 border-b flex items-center px-10 transition-colors ${isDark ? 'bg-[#0a0a0b]/90 border-white/5' : 'bg-white/90 border-zinc-200'}`}>
                                    <h2 className={`text-xs font-black uppercase italic ${isDark ? 'text-white' : 'text-zinc-900'}`}>Conversa Ativa</h2>
                                </header>
                                <div className="flex-1 overflow-y-auto p-10 space-y-8">
                                    {messages.map((m, i) => (
                                        <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-fade`}>
                                            <div className={`max-w-[75%] p-6 rounded-[2.5rem] text-sm shadow-xl ${m.role === 'user' ? 'bg-blue-600 text-white font-bold' : isDark ? 'bg-[#111112] border border-white/5 text-zinc-300' : 'bg-white border border-zinc-200 text-zinc-600'}`}>
                                                <p className="text-[8px] font-black uppercase opacity-40 mb-3 tracking-widest">{m.role === 'user' ? userData.name : 'YO AI'}</p>
                                                <p className="whitespace-pre-wrap">{m.content}</p>
                                                {m.script && (
                                                    <button onClick={() => { setActiveScript(m.script); setIsEditorOpen(true); }} className="mt-4 w-full p-4 bg-zinc-900 text-white rounded-2xl font-black uppercase text-[10px] hover:bg-blue-700 transition-all border border-white/10">Ver Script: {m.script.name}</button>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                    <div ref={chatRef} />
                                </div>
                                <footer className="p-10">
                                    <form onSubmit={onSend} className="max-w-4xl mx-auto relative">
                                        <input 
                                            value={input} onChange={e => setInput(e.target.value)} 
                                            placeholder="Descreva o que o script deve fazer..." 
                                            className={`w-full border rounded-[2.5rem] px-10 py-6 pr-24 outline-none transition-all text-sm shadow-xl ${isDark ? 'bg-[#121214] border-white/10 text-white focus:border-blue-600' : 'bg-white border-zinc-200 text-zinc-900 focus:border-blue-600'}`} 
                                        />
                                        <button type="submit" disabled={isSending} className="absolute right-4 top-1/2 -translate-y-1/2 w-14 h-14 bg-blue-600 text-white rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-all">
                                            {isSending ? <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M5 12h14M12 5l7 7-7 7"/></svg>}
                                        </button>
                                    </form>
                                </footer>
                            </>
                        )}
                    </main>

                    {/* Editor Panel */}
                    {isEditorOpen && (
                        <div className={`fixed right-0 top-0 bottom-0 w-full lg:w-[45%] border-l z-50 flex flex-col animate-slide-in shadow-2xl ${isDark ? 'bg-[#050505] border-white/10' : 'bg-zinc-50 border-zinc-200'}`}>
                            <header className={`h-20 border-b flex items-center justify-between px-10 ${isDark ? 'bg-[#0a0a0b] border-white/10' : 'bg-white border-zinc-200'}`}>
                                <h3 className={`text-xs font-black uppercase italic ${isDark ? 'text-white' : 'text-zinc-900'}`}>{activeScript?.name}</h3>
                                <button onClick={() => setIsEditorOpen(false)} className="p-2 hover:scale-110"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
                            </header>
                            <div className="flex-1 p-10 overflow-auto">
                                <div className={`p-4 mb-6 rounded-2xl text-[10px] font-bold ${isDark ? 'bg-blue-600/10 text-blue-400' : 'bg-blue-50 text-blue-600'}`}>Local: {activeScript?.location}</div>
                                <pre className={`p-8 rounded-3xl font-mono text-[11px] overflow-x-auto leading-relaxed ${isDark ? 'bg-black text-blue-400' : 'bg-zinc-100 text-blue-700'}`}>
                                    <code>{activeScript?.code}</code>
                                </pre>
                            </div>
                        </div>
                    )}

                    {/* Settings Modal */}
                    {isProfileModal && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] flex items-center justify-center p-6">
                            <div className={`w-full max-w-lg rounded-[3rem] p-10 shadow-2xl border ${isDark ? 'bg-[#0d0d0e] border-white/10 text-white' : 'bg-white border-zinc-200 text-zinc-900'}`}>
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-black italic tracking-tighter">CONFIGURAÇÕES</h2>
                                    <button onClick={() => setIsProfileModal(false)} className="p-2 hover:bg-white/5 rounded-full"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
                                </div>
                                <div className="space-y-6">
                                    <div>
                                        <label className="text-[10px] font-black uppercase text-zinc-500 mb-2 block tracking-widest">Tema</label>
                                        <div className="grid grid-cols-2 gap-4">
                                            <button onClick={() => setUserData({...userData, theme: 'dark'})} className={`p-4 rounded-2xl border font-bold text-xs ${isDark ? 'bg-blue-600 text-white' : 'bg-zinc-100'}`}>Escuro</button>
                                            <button onClick={() => setUserData({...userData, theme: 'light'})} className={`p-4 rounded-2xl border font-bold text-xs ${!isDark ? 'bg-blue-600 text-white' : 'bg-white/5'}`}>Claro</button>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black uppercase text-zinc-500 mb-2 block tracking-widest">Configurar Personalidade (Prompt)</label>
                                        <textarea 
                                            value={userData.systemPrompt} 
                                            onChange={e => setUserData({...userData, systemPrompt: e.target.value})} 
                                            className={`w-full h-40 rounded-2xl p-4 text-[11px] font-mono border outline-none ${isDark ? 'bg-black border-white/10 text-blue-400' : 'bg-zinc-50 border-zinc-200 text-blue-700'}`}
                                        />
                                    </div>
                                    <button onClick={() => setIsProfileModal(false)} className="w-full py-4 bg-white text-black font-black uppercase text-[10px] rounded-2xl">Salvar e Fechar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
