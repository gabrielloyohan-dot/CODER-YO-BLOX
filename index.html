<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YO CODE BLOX - Roblox Specialist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050506; color: #e2e8f0; margin: 0; overflow: hidden; }
        .code-font { font-family: 'Fira Code', monospace; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        .scanline { position: absolute; width: 100%; height: 2px; background: rgba(59, 130, 246, 0.1); animation: scanline 4s linear infinite; pointer-events: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [username, setUsername] = useState('');
            const [isLogged, setIsLogged] = useState(false);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [isSidebarOpen, setSidebarOpen] = useState(false);
            const [activeScript, setActiveScript] = useState(null);
            const [copied, setCopied] = useState(false);
            const chatRef = useRef(null);

            // Auto-scroll para as mensagens
            useEffect(() => {
                if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
            }, [messages, isLoading]);

            const copyToClipboard = (text) => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const callGemini = async (prompt, retries = 0) => {
                const apiKey = ""; // Injetado pelo ambiente
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: `Você é o "YO CODE BLOX", um Especialista de Elite em Roblox Studio e Linguagem Luau. 
                            REGRAS CRÍTICAS:
                            1. PROIBIDO gerar C#, Java, Python ou scripts de Unity.
                            2. Use APENAS a linguagem Luau e as APIs oficiais do Roblox (workspace, game:GetService, etc).
                            3. Responda APENAS em JSON no formato: { "explanation": "explicação breve em PT-PT", "script": { "name": "NomeDoScript", "location": "ServerScriptService ou StarterGui", "code": "-- código luau aqui" } }.
                            4. Se não houver código, o campo "script" deve ser null.` }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (!res.ok) throw new Error("Erro na API");
                    const data = await res.json();
                    return JSON.parse(data.candidates[0].content.parts[0].text);
                } catch (err) {
                    if (retries < 5) {
                        await new Promise(r => setTimeout(r, Math.pow(2, retries) * 1000));
                        return callGemini(prompt, retries + 1);
                    }
                    throw err;
                }
            };

            const handleSend = async (e) => {
                e.preventDefault();
                if (!input.trim() || isLoading) return;

                const userMsg = { role: 'user', content: input };
                setMessages(prev => [...prev, userMsg]);
                const currentInput = input;
                setInput('');
                setIsLoading(true);

                try {
                    const result = await callGemini(currentInput);
                    setMessages(prev => [...prev, { 
                        role: 'assistant', 
                        content: result.explanation, 
                        script: result.script 
                    }]);
                    if (result.script) setActiveScript(result.script);
                } catch (error) {
                    setMessages(prev => [...prev, { 
                        role: 'assistant', 
                        content: "Erro de conexão. A API falhou após várias tentativas." 
                    }]);
                } finally {
                    setIsLoading(false);
                }
            };

            // Tela de Login Simples
            if (!isLogged) {
                return (
                    <div className="h-screen w-full flex items-center justify-center p-6 bg-[#020203]">
                        <div className="scanline"></div>
                        <div className="w-full max-w-sm glass p-10 rounded-[3rem] text-center relative">
                            <div className="mb-8">
                                <h1 className="text-6xl font-black italic tracking-tighter text-white">YO</h1>
                                <p className="text-[10px] font-bold text-blue-500 uppercase tracking-[0.4em] mt-2">Code Blox Studio</p>
                            </div>
                            <form onSubmit={(e) => { e.preventDefault(); if(username) setIsLogged(true); }}>
                                <input 
                                    className="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white text-center outline-none focus:border-blue-500 transition-all mb-4"
                                    placeholder="USUÁRIO ROBLOX"
                                    value={username}
                                    onChange={e => setUsername(e.target.value.toUpperCase())}
                                />
                                <button className="w-full py-4 rounded-2xl bg-blue-600 text-white font-black uppercase text-[11px] tracking-widest active:scale-95 transition-transform">
                                    Iniciar Sessão
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen w-full relative">
                    {/* Sidebar Mobile & Desktop */}
                    <aside className={`fixed lg:relative z-50 h-full bg-[#080809] border-r border-white/5 transition-all duration-300 ${isSidebarOpen ? 'w-[280px] translate-x-0' : 'w-0 lg:w-[320px] -translate-x-full lg:translate-x-0'} overflow-hidden`}>
                        <div className="w-[280px] lg:w-full flex flex-col h-full">
                            <div className="p-8 border-b border-white/5 flex items-center justify-between">
                                <h2 className="text-xl font-black italic text-white">YO BLOX</h2>
                                <button onClick={() => setSidebarOpen(false)} className="lg:hidden text-zinc-500"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
                            </div>
                            <div className="flex-1 p-6 overflow-y-auto space-y-2 no-scrollbar">
                                <p className="text-[9px] font-black text-zinc-600 uppercase tracking-widest mb-4">Arquivos Gerados</p>
                                {messages.filter(m => m.script).map((m, i) => (
                                    <button key={i} onClick={() => { setActiveScript(m.script); setSidebarOpen(false); }} className="w-full flex items-center gap-3 p-3 rounded-xl bg-white/5 border border-white/5 text-[10px] font-bold text-zinc-400 uppercase truncate">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>
                                        {m.script.name}
                                    </button>
                                ))}
                            </div>
                            <div className="p-8 border-t border-white/5 bg-black/40">
                                <div className="flex items-center gap-4">
                                    <div className="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-black text-white text-xs">{username[0]}</div>
                                    <div>
                                        <p className="text-[10px] font-black text-white uppercase">{username}</p>
                                        <p className="text-[8px] font-bold text-zinc-600 uppercase">Status: Developer</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* Chat Area */}
                    <main className="flex-1 flex flex-col bg-[#050506] relative">
                        <header className="h-16 lg:h-20 border-b border-white/5 flex items-center px-6 lg:px-10 justify-between bg-black/20 backdrop-blur-md">
                            <button onClick={() => setSidebarOpen(true)} className="lg:hidden text-zinc-400"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
                            <div className="flex items-center gap-2">
                                <div className="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></div>
                                <span className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Luau Compiler Ready</span>
                            </div>
                            <button onClick={() => setIsLogged(false)} className="text-[9px] font-black text-zinc-600 uppercase hover:text-white transition-colors">Sair</button>
                        </header>

                        <div ref={chatRef} className="flex-1 overflow-y-auto p-6 lg:p-12 space-y-8 no-scrollbar">
                            {messages.length === 0 && (
                                <div className="h-full flex flex-col items-center justify-center opacity-10 grayscale pointer-events-none">
                                    <h1 className="text-9xl font-black italic tracking-tighter">YO</h1>
                                    <p className="text-[10px] font-bold uppercase tracking-[1.5em]">Roblox Workspace</p>
                                </div>
                            )}
                            {messages.map((m, i) => (
                                <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-up`}>
                                    <div className={`max-w-[90%] lg:max-w-[70%] p-6 rounded-[2rem] ${m.role === 'user' ? 'bg-blue-600 text-white' : 'glass text-zinc-300'}`}>
                                        <p className="text-xs lg:text-sm leading-relaxed">{m.content}</p>
                                        {m.script && (
                                            <button 
                                                onClick={() => setActiveScript(m.script)}
                                                className="mt-6 w-full py-4 bg-black/40 border border-white/10 rounded-2xl flex items-center justify-center gap-3 text-[10px] font-black uppercase tracking-widest hover:border-blue-500/50 transition-all"
                                            >
                                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" strokeWidth="3"><path d="M16 18l6-6-6-6M8 6l-6 6 6 6"/></svg>
                                                Ver Script Luau
                                            </button>
                                        )}
                                    </div>
                                </div>
                            ))}
                            {isLoading && (
                                <div className="flex gap-2 text-blue-500 font-black text-[9px] uppercase tracking-widest animate-pulse">
                                    <svg className="animate-spin" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                                    Pensando em Luau...
                                </div>
                            )}
                        </div>

                        <div className="p-6 lg:p-10 border-t border-white/5 bg-[#080809]">
                            <form onSubmit={handleSend} className="max-w-4xl mx-auto relative group">
                                <input 
                                    className="w-full bg-[#111112] border border-white/10 rounded-2xl lg:rounded-[2.5rem] px-8 py-5 lg:py-7 pr-20 outline-none focus:border-blue-600 transition-all text-sm"
                                    placeholder="Descreve o sistema que precisas para o Roblox..."
                                    value={input}
                                    onChange={e => setInput(e.target.value)}
                                />
                                <button className="absolute right-3 top-1/2 -translate-y-1/2 w-12 h-12 lg:w-14 lg:h-14 bg-white text-black rounded-xl lg:rounded-full flex items-center justify-center hover:bg-blue-600 hover:text-white transition-all">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                                </button>
                            </form>
                        </div>
                    </main>

                    {/* Editor de Código (Overlay) */}
                    {activeScript && (
                        <div className="fixed inset-0 z-[100] flex items-end lg:items-center justify-center bg-black/90 backdrop-blur-md p-0 lg:p-10">
                            <div className="w-full max-w-4xl h-[90vh] lg:h-[80vh] bg-[#0a0a0b] border border-white/10 rounded-t-[3rem] lg:rounded-[3rem] flex flex-col shadow-2xl overflow-hidden">
                                <div className="p-8 border-b border-white/5 flex items-center justify-between">
                                    <div>
                                        <h3 className="text-xs font-black text-white uppercase tracking-tighter">{activeScript.name}</h3>
                                        <p className="text-[8px] font-bold text-blue-500 uppercase tracking-widest mt-1">Location: {activeScript.location}</p>
                                    </div>
                                    <div className="flex gap-3">
                                        <button 
                                            onClick={() => copyToClipboard(activeScript.code)}
                                            className="px-6 py-3 bg-blue-600 text-white rounded-xl text-[9px] font-black uppercase tracking-widest flex items-center gap-2"
                                        >
                                            {copied ? <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M20 6L9 17l-5-5"/></svg> : <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2M16 4h2a2 2 0 0 1 2 2v4M8 4v4h8V4M8 4h8"/></svg>}
                                            {copied ? 'Copiado' : 'Copiar'}
                                        </button>
                                        <button onClick={() => setActiveScript(null)} className="p-3 text-zinc-500 hover:text-white"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
                                    </div>
                                </div>
                                <div className="flex-1 overflow-auto p-8 bg-black/40">
                                    <pre className="code-font text-xs lg:text-sm text-blue-300 leading-relaxed">
                                        <code>{activeScript.code}</code>
                                    </pre>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
