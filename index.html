<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YO CODE BLOX - Professional Studio</title>
    <!-- Core Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #3b82f6; }
        body { font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; background: #050505; color: #e4e4e7; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .code-font { font-family: 'Fira Code', monospace; }
        
        /* Animations */
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
        
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .animate-editor { animation: slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

        .btn-primary { @apply bg-blue-600 hover:bg-blue-500 text-white font-bold transition-all active:scale-95; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "", // O ambiente injetará a chave ou usará bypass
            authDomain: "yo-code-blox.firebaseapp.com",
            projectId: "yo-code-blox"
        };

        function App() {
            const [user, setUser] = useState(null);
            const [tempName, setTempName] = useState('');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [activeScript, setActiveScript] = useState(null);
            const [copyStatus, setCopyStatus] = useState('Copiar Script');
            const chatRef = useRef(null);

            // Auto-scroll chat
            useEffect(() => {
                if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
            }, [messages]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (tempName.trim()) {
                    setUser({ name: tempName, id: 'user_' + Math.random().toString(36).substr(2, 9) });
                }
            };

            const copyToClipboard = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopyStatus('Copiado!');
                    setTimeout(() => setCopyStatus('Copiar Script'), 2000);
                } catch (err) {
                    setCopyStatus('Erro ao copiar');
                }
                document.body.removeChild(textArea);
            };

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!input.trim() || isTyping) return;

                const userMsg = { id: Date.now(), role: 'user', content: input };
                setMessages(prev => [...prev, userMsg]);
                setInput('');
                setIsTyping(true);

                try {
                    const apiKey = ""; // Runtime key
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: input }] }],
                            systemInstruction: { parts: [{ text: "Você é o YO CODE AI. Responda em Português. Formate sua resposta SEMPRE como um JSON com as chaves: 'text' (sua explicação) e 'script' (um objeto opcional com 'name', 'code' e 'location')." }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    const data = await response.json();
                    const result = JSON.parse(data.candidates[0].content.parts[0].text);
                    
                    setMessages(prev => [...prev, { 
                        id: Date.now() + 1, 
                        role: 'assistant', 
                        content: result.text,
                        script: result.script
                    }]);
                } catch (error) {
                    setMessages(prev => [...prev, { id: Date.now() + 1, role: 'assistant', content: "Erro na conexão. Verifique o console." }]);
                } finally {
                    setIsTyping(false);
                }
            };

            if (!user) {
                return (
                    <div className="h-screen flex items-center justify-center p-6 bg-black">
                        <div className="w-full max-w-md glass p-12 rounded-[3rem] text-center animate-slide-up shadow-2xl border-white/5">
                            <div className="mb-8">
                                <h1 className="text-6xl font-black italic tracking-tighter text-white">YO</h1>
                                <p className="text-[10px] font-bold text-blue-500 uppercase tracking-[0.4em] mt-2">Workspace Studio</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-6">
                                <input 
                                    autoFocus
                                    className="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 text-white text-center outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 transition-all text-sm font-medium"
                                    placeholder="INSIRA SEU USERNAME"
                                    value={tempName}
                                    onChange={e => setTempName(e.target.value)}
                                />
                                <button className="w-full py-5 rounded-2xl bg-white text-black font-black uppercase text-xs tracking-widest hover:bg-blue-600 hover:text-white transition-all shadow-xl">
                                    Iniciar Sessão
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen w-full bg-[#050505]">
                    {/* Sidebar de Navegação */}
                    <aside className="w-20 lg:w-72 border-r border-white/5 flex flex-col bg-[#080809]">
                        <div className="p-8 border-b border-white/5 flex items-center gap-3">
                            <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black italic text-white shadow-lg shadow-blue-600/20">YO</div>
                            <div className="hidden lg:block">
                                <h2 className="text-sm font-black italic tracking-tight text-white leading-none">YO STUDIO</h2>
                                <span className="text-[8px] font-bold text-zinc-500 uppercase tracking-widest">v2.5 Professional</span>
                            </div>
                        </div>
                        
                        <nav className="flex-1 p-4 space-y-2">
                            <div className="p-4 rounded-2xl bg-white/5 border border-white/10 flex items-center gap-4 text-blue-500">
                                <div className="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
                                <span className="text-[10px] font-black uppercase tracking-widest hidden lg:block">Console Principal</span>
                            </div>
                        </nav>

                        <div className="p-6 border-t border-white/5 bg-black/40">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded-full bg-zinc-800 border border-white/10 flex items-center justify-center text-[10px] font-bold">{user.name[0]}</div>
                                <div className="hidden lg:block overflow-hidden">
                                    <p className="text-[10px] font-black text-white uppercase truncate">{user.name}</p>
                                    <p className="text-[8px] font-medium text-zinc-500 uppercase tracking-tighter">Online</p>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* Área de Trabalho Central */}
                    <main className="flex-1 flex flex-col relative min-w-0">
                        <header className="h-20 border-b border-white/5 bg-[#0a0a0b]/80 backdrop-blur-xl flex items-center px-10 justify-between">
                            <div className="flex items-center gap-4">
                                <span className="text-[10px] font-black text-zinc-500 uppercase tracking-[0.2em]">Terminal</span>
                                <div className="h-4 w-px bg-white/10"></div>
                                <span className="text-[10px] font-medium text-blue-400">workspace/main_ai</span>
                            </div>
                        </header>

                        {/* Lista de Mensagens */}
                        <div ref={chatRef} className="flex-1 overflow-y-auto p-6 lg:p-12 space-y-8 scroll-smooth">
                            {messages.length === 0 && (
                                <div className="h-full flex flex-col items-center justify-center text-center opacity-20">
                                    <h1 className="text-[10rem] font-black italic tracking-tighter leading-none select-none">YO</h1>
                                    <p className="text-xs font-bold uppercase tracking-[1em] mt-4">Sistema Pronto</p>
                                </div>
                            )}

                            {messages.map(m => (
                                <div key={m.id} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-slide-up`}>
                                    <div className={`max-w-[85%] lg:max-w-[70%] p-6 rounded-3xl shadow-2xl relative ${
                                        m.role === 'user' 
                                        ? 'bg-blue-600 text-white font-semibold' 
                                        : 'bg-[#121214] border border-white/5 text-zinc-300'
                                    }`}>
                                        <span className="absolute -top-3 left-6 text-[8px] font-black uppercase tracking-widest px-2 py-1 bg-black border border-white/10 rounded-md">
                                            {m.role === 'user' ? user.name : 'YO INTELLIGENCE'}
                                        </span>
                                        <p className="text-sm leading-relaxed whitespace-pre-wrap">{m.content}</p>
                                        
                                        {m.script && (
                                            <div className="mt-6 pt-6 border-t border-white/10">
                                                <div className="flex items-center justify-between mb-4">
                                                    <span className="text-[10px] font-black text-blue-400 uppercase italic">Script Gerado</span>
                                                    <span className="text-[9px] font-mono opacity-50">{m.script.name}</span>
                                                </div>
                                                <button 
                                                    onClick={() => setActiveScript(m.script)}
                                                    className="w-full py-4 bg-white/5 border border-white/10 hover:bg-blue-600 hover:border-blue-500 text-white rounded-2xl text-[10px] font-black uppercase transition-all flex items-center justify-center gap-2 group"
                                                >
                                                    Abrir no Editor
                                                    <svg className="group-hover:translate-x-1 transition-transform" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="m9 18 6-6-6-6"/></svg>
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                            {isTyping && (
                                <div className="flex justify-start animate-pulse">
                                    <div className="bg-[#121214] border border-white/5 p-4 rounded-2xl flex gap-1">
                                        <div className="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce"></div>
                                        <div className="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce [animation-delay:0.2s]"></div>
                                        <div className="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce [animation-delay:0.4s]"></div>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Input de Chat */}
                        <div className="p-6 lg:p-10 border-t border-white/5 bg-[#080809]">
                            <form onSubmit={sendMessage} className="max-w-5xl mx-auto relative group">
                                <input 
                                    className="w-full bg-[#111112] border border-white/10 rounded-[2rem] px-10 py-6 pr-24 outline-none focus:border-blue-600 focus:ring-4 focus:ring-blue-600/10 transition-all text-sm font-medium placeholder:text-zinc-700"
                                    placeholder="Peça um script ou descreva uma funcionalidade..."
                                    value={input}
                                    onChange={e => setInput(e.target.value)}
                                />
                                <button className="absolute right-3 top-1/2 -translate-y-1/2 w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center hover:scale-110 active:scale-95 transition-all shadow-lg shadow-blue-600/30">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                                </button>
                            </form>
                            <p className="text-center text-[9px] font-bold text-zinc-700 uppercase tracking-widest mt-6">Powered by Gemini Pro Engine & YO Studio</p>
                        </div>
                    </main>

                    {/* Editor de Script Lateral (Side Drawer) */}
                    {activeScript && (
                        <div className="fixed inset-0 lg:relative lg:inset-auto z-50 flex">
                            <div onClick={() => setActiveScript(null)} className="lg:hidden absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
                            <div className="ml-auto w-full max-w-2xl bg-[#0a0a0b] border-l border-white/10 flex flex-col shadow-2xl animate-editor relative">
                                <header className="h-20 border-b border-white/10 flex items-center justify-between px-8 bg-black/40 backdrop-blur-md">
                                    <div className="flex flex-col">
                                        <span className="text-[9px] font-black text-blue-500 uppercase tracking-widest">Source Viewer</span>
                                        <h3 className="text-xs font-black uppercase text-white tracking-tight">{activeScript.name}</h3>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <button 
                                            onClick={() => copyToClipboard(activeScript.code)}
                                            className="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-[10px] font-black uppercase tracking-widest transition-all active:scale-95 flex items-center gap-2"
                                        >
                                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                                            {copyStatus}
                                        </button>
                                        <button onClick={() => setActiveScript(null)} className="p-2 text-zinc-500 hover:text-white transition-colors">
                                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M18 6 6 18M6 6l12 12"/></svg>
                                        </button>
                                    </div>
                                </header>
                                
                                <div className="flex-1 overflow-auto p-8 lg:p-12">
                                    <div className="bg-blue-600/5 border border-blue-500/20 rounded-2xl p-4 mb-8 flex items-center gap-4">
                                        <div className="w-2 h-2 rounded-full bg-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.5)]"></div>
                                        <p className="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Local: {activeScript.location}</p>
                                    </div>
                                    
                                    <div className="relative rounded-3xl overflow-hidden border border-white/5 bg-[#050505] shadow-inner">
                                        <div className="flex items-center px-6 py-3 border-b border-white/5 bg-black/40 gap-1.5">
                                            <div className="w-2.5 h-2.5 rounded-full bg-[#ff5f56]"></div>
                                            <div className="w-2.5 h-2.5 rounded-full bg-[#ffbd2e]"></div>
                                            <div className="w-2.5 h-2.5 rounded-full bg-[#27c93f]"></div>
                                        </div>
                                        <pre className="p-8 code-font text-[12px] leading-relaxed overflow-x-auto text-blue-400/90 whitespace-pre">
                                            <code>{activeScript.code}</code>
                                        </pre>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
