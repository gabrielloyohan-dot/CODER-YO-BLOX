<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YO CODE BLOX - Professional Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #3b82f6; --bg: #050506; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #e2e8f0; margin: 0; overflow: hidden; }
        .code-font { font-family: 'Fira Code', monospace; }
        .glass-panel { background: rgba(10, 10, 12, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .glow-blue { shadow-lg shadow-blue-500/20; }
        .terminal-text { text-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        
        .tab-size-4 { tab-size: 4; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [username, setUsername] = useState('');
            const [isLogged, setIsLogged] = useState(false);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [activeScript, setActiveScript] = useState(null);
            const [copied, setCopied] = useState(false);
            const chatRef = useRef(null);

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'yo-blox-v2';

            useEffect(() => {
                if (chatRef.current) {
                    chatRef.current.scrollTop = chatRef.current.scrollHeight;
                }
            }, [messages, isLoading]);

            const copyCode = (text) => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const callAI = async (userPrompt, retryCount = 0) => {
                const apiKey = ""; // Injetado automaticamente
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const systemPrompt = `Você é o "YO INTELLIGENCE", o motor de IA do YO STUDIO. 
                Sua especialidade é Roblox (Luau).
                Responda APENAS em JSON válido. Não use blocos de código markdown (\`\`\`) no JSON.
                
                {
                    "explanation": "Explicação técnica em PT-PT",
                    "script": {
                        "name": "NomeDoScript",
                        "location": "Onde colocar no Explorer",
                        "code": "-- Código Luau aqui"
                    }
                }`;

                try {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userPrompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json", temperature: 0.2 }
                        })
                    });

                    if (!response.ok) throw new Error("Falha na Rede");
                    const data = await response.json();
                    return JSON.parse(data.candidates[0].content.parts[0].text);
                } catch (err) {
                    if (retryCount < 5) {
                        await new Promise(r => setTimeout(r, Math.pow(2, retryCount) * 1000));
                        return callAI(userPrompt, retryCount + 1);
                    }
                    throw err;
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!input.trim() || isLoading) return;

                const text = input;
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: text }]);
                setIsLoading(true);

                try {
                    const res = await callAI(text);
                    setMessages(prev => [...prev, { 
                        role: 'assistant', 
                        content: res.explanation, 
                        script: res.script 
                    }]);
                    if (res.script) setActiveScript(res.script);
                } catch (e) {
                    setMessages(prev => [...prev, { 
                        role: 'assistant', 
                        content: "ERRO DE PROTOCOLO: Falha na conexão com o servidor de IA. Verifique o console ou tente novamente." 
                    }]);
                } finally {
                    setIsLoading(false);
                }
            };

            if (!isLogged) {
                return (
                    <div className="h-screen w-full flex items-center justify-center bg-[#020203] p-6">
                        <div className="w-full max-w-sm p-12 rounded-[2.5rem] glass-panel border-white/10 text-center animate-in">
                            <h1 className="text-5xl font-black italic tracking-tighter text-white mb-2">YO</h1>
                            <p className="text-[10px] font-bold text-blue-500 uppercase tracking-[0.3em] mb-10">Professional v2.8</p>
                            <form onSubmit={(e) => { e.preventDefault(); if(username) setIsLogged(true); }}>
                                <input 
                                    className="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 text-white text-center outline-none focus:border-blue-500 transition-all mb-4 text-xs font-bold uppercase"
                                    placeholder="IDENTIFICAÇÃO"
                                    value={username}
                                    onChange={e => setUsername(e.target.value.toUpperCase())}
                                />
                                <button className="w-full py-4 bg-blue-600 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] text-white hover:bg-blue-500 transition-all shadow-lg shadow-blue-600/20">
                                    Iniciar Sessão
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen w-full bg-[#050506] relative overflow-hidden">
                    {/* Sidebar */}
                    <div className="hidden lg:flex w-80 flex-col border-r border-white/5 bg-[#080809]">
                        <div className="p-10">
                            <h2 className="text-2xl font-black italic text-white tracking-tighter flex items-center gap-3">
                                YO STUDIO
                            </h2>
                            <p className="text-[9px] font-bold text-zinc-500 uppercase mt-1">Workspace Online</p>
                        </div>
                        <div className="flex-1 px-6 space-y-2 overflow-y-auto no-scrollbar">
                            <p className="text-[9px] font-black text-zinc-600 uppercase tracking-widest px-4 mb-4">Arquivos Gerados</p>
                            {messages.filter(m => m.script).map((m, i) => (
                                <button 
                                    key={i} 
                                    onClick={() => setActiveScript(m.script)}
                                    className="w-full flex items-center gap-3 p-4 rounded-2xl bg-white/5 border border-white/5 text-[10px] font-bold text-zinc-400 hover:text-white hover:bg-white/10 transition-all truncate uppercase"
                                >
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
                                    {m.script.name}
                                </button>
                            ))}
                        </div>
                        <div className="p-8 border-t border-white/5 flex items-center gap-4">
                            <div className="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-black text-white text-xs">{username[0]}</div>
                            <div>
                                <p className="text-[10px] font-black text-white uppercase">{username}</p>
                                <p className="text-[8px] font-bold text-green-500 uppercase tracking-widest">Online</p>
                            </div>
                        </div>
                    </div>

                    {/* Chat Section */}
                    <div className="flex-1 flex flex-col relative">
                        <header className="h-20 border-b border-white/5 flex items-center px-10 justify-between bg-black/40 backdrop-blur-md">
                            <div className="flex items-center gap-4">
                                <span className="text-[10px] font-black text-zinc-500 uppercase tracking-[0.2em]">Terminal</span>
                                <span className="text-[10px] text-zinc-700">/</span>
                                <span className="text-[10px] font-bold text-blue-500 uppercase tracking-widest">workspace/main_ai</span>
                            </div>
                        </header>

                        <div ref={chatRef} className="flex-1 overflow-y-auto p-8 lg:p-16 space-y-10 no-scrollbar">
                            {messages.length === 0 && (
                                <div className="h-full flex flex-col items-center justify-center opacity-10">
                                    <h1 className="text-9xl font-black italic text-white tracking-tighter">YO</h1>
                                    <p className="text-xs font-bold uppercase tracking-[1em] text-white">Intelligence</p>
                                </div>
                            )}
                            {messages.map((m, i) => (
                                <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-in`}>
                                    <div className={`max-w-[85%] lg:max-w-[60%] p-6 rounded-[2rem] ${m.role === 'user' ? 'bg-blue-600 text-white shadow-xl shadow-blue-600/10' : 'glass-panel text-zinc-300'}`}>
                                        <p className="text-xs lg:text-sm leading-relaxed">{m.content}</p>
                                        {m.script && (
                                            <button 
                                                onClick={() => setActiveScript(m.script)}
                                                className="mt-6 w-full py-4 bg-black/50 border border-white/10 rounded-2xl flex items-center justify-center gap-3 text-[10px] font-black uppercase tracking-widest hover:border-blue-500 transition-all group"
                                            >
                                                <svg className="group-hover:scale-110 transition-transform" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" strokeWidth="3"><path d="M16 18l6-6-6-6M8 6l-6 6 6 6"/></svg>
                                                Injetar Código Luau
                                            </button>
                                        )}
                                    </div>
                                </div>
                            ))}
                            {isLoading && (
                                <div className="flex items-center gap-3 text-blue-500 font-black text-[9px] uppercase tracking-widest animate-pulse">
                                    <div className="w-4 h-4 border-2 border-current border-t-transparent rounded-full animate-spin"></div>
                                    A gerar resposta técnica...
                                </div>
                            )}
                        </div>

                        <div className="p-8 lg:p-12">
                            <form onSubmit={handleSubmit} className="max-w-4xl mx-auto relative group">
                                <div className="absolute -inset-1 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-[2rem] opacity-20 blur group-focus-within:opacity-40 transition-opacity"></div>
                                <input 
                                    className="relative w-full bg-[#0a0a0b] border border-white/10 rounded-[2rem] px-8 py-6 lg:py-8 pr-20 outline-none focus:border-blue-500 transition-all text-xs lg:text-sm text-white placeholder:text-zinc-700"
                                    placeholder="Peça um script ou descreva uma funcionalidade..."
                                    value={input}
                                    onChange={e => setInput(e.target.value)}
                                    disabled={isLoading}
                                />
                                <button className="absolute right-4 top-1/2 -translate-y-1/2 w-12 h-12 lg:w-14 lg:h-14 bg-blue-600 rounded-2xl lg:rounded-full text-white flex items-center justify-center hover:bg-blue-500 transition-all disabled:opacity-50">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                                </button>
                            </form>
                        </div>
                    </div>

                    {/* Script Editor Overlay */}
                    {activeScript && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 lg:p-20 bg-black/90 backdrop-blur-xl animate-in">
                            <div className="w-full max-w-6xl h-full bg-[#0a0a0c] border border-white/10 rounded-[3rem] overflow-hidden flex flex-col shadow-2xl">
                                <div className="p-8 border-b border-white/5 flex items-center justify-between bg-white/2">
                                    <div>
                                        <h3 className="text-sm font-black text-white uppercase tracking-widest">{activeScript.name}</h3>
                                        <p className="text-[10px] font-bold text-blue-500 uppercase mt-1">Local: {activeScript.location}</p>
                                    </div>
                                    <div className="flex gap-4">
                                        <button 
                                            onClick={() => copyCode(activeScript.code)}
                                            className="px-8 py-4 bg-blue-600 rounded-2xl text-[10px] font-black uppercase text-white hover:bg-blue-500 transition-all flex items-center gap-3 shadow-lg shadow-blue-600/20"
                                        >
                                            {copied ? "Copiado!" : "Copiar Script"}
                                        </button>
                                        <button onClick={() => setActiveScript(null)} className="p-4 text-zinc-500 hover:text-white">
                                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M18 6 6 18M6 6l12 12"/></svg>
                                        </button>
                                    </div>
                                </div>
                                <div className="flex-1 overflow-auto p-10 bg-black/40">
                                    <pre className="code-font text-xs lg:text-sm text-blue-100/80 leading-relaxed tab-size-4">
                                        <code>{activeScript.code}</code>
                                    </pre>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
