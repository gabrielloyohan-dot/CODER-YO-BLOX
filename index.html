<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YO STUDIO | Professional</title>
    <!-- Bibliotecas Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Fira+Code&display=swap" rel="stylesheet">

    <style>
        body { 
            background-color: #050505; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .code-area { font-family: 'Fira Code', monospace; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        @keyframes pulse-border {
            0% { border-color: rgba(59, 130, 246, 0.2); }
            50% { border-color: rgba(59, 130, 246, 0.8); }
            100% { border-color: rgba(59, 130, 246, 0.2); }
        }
        .active-input { animation: pulse-border 2s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [step, setStep] = useState('auth'); // auth, chat
            const [username, setUsername] = useState('');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [viewScript, setViewScript] = useState(null);
            const chatEndRef = useRef(null);

            const scrollToBottom = () => chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            useEffect(scrollToBottom, [messages, loading]);

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!input.trim() || loading) return;

                const userText = input;
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: userText }]);
                setLoading(true);

                try {
                    // Configuração da API - Chave vazia para o ambiente injetar
                    const apiKey = ""; 
                    const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

                    const prompt = `Você é um desenvolvedor expert em Roblox Luau. 
                    Responda ao pedido: "${userText}". 
                    FORME A RESPOSTA APENAS NESTE FORMATO JSON (SEM MARKDOWN):
                    {"explanacao": "texto", "script": {"nome": "nome", "local": "local", "codigo": "codigo"}}`;

                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (!response.ok) throw new Error("Falha na API");
                    
                    const data = await response.json();
                    const aiResult = JSON.parse(data.candidates[0].content.parts[0].text);

                    setMessages(prev => [...prev, { 
                        role: 'ai', 
                        content: aiResult.explanacao, 
                        script: aiResult.script 
                    }]);

                } catch (err) {
                    setMessages(prev => [...prev, { 
                        role: 'ai', 
                        content: "ERRO CRÍTICO: Não foi possível conectar ao motor YO Intelligence. Verifique a sua ligação." 
                    }]);
                } finally {
                    setLoading(false);
                }
            };

            if (step === 'auth') {
                return (
                    <div className="h-screen flex items-center justify-center p-6">
                        <div className="glass p-12 rounded-[2rem] w-full max-w-md text-center border-white/5">
                            <div className="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-2xl shadow-blue-600/30">
                                <span className="text-3xl font-black italic">YO</span>
                            </div>
                            <h1 className="text-2xl font-black uppercase tracking-tighter mb-2">Aceder Workspace</h1>
                            <p className="text-zinc-500 text-xs font-bold uppercase tracking-widest mb-10">Versão Profissional 3.0</p>
                            
                            <input 
                                className="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-6 text-center outline-none focus:border-blue-500 transition-all text-sm font-bold uppercase tracking-widest mb-4"
                                placeholder="NOME DE UTILIZADOR"
                                value={username}
                                onChange={e => setUsername(e.target.value.toUpperCase())}
                            />
                            <button 
                                onClick={() => username && setStep('chat')}
                                className="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-black uppercase tracking-widest transition-all shadow-lg shadow-blue-600/20"
                            >
                                Iniciar Motor
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen w-full">
                    {/* Sidebar */}
                    <div className="w-72 bg-[#080808] border-r border-white/5 flex flex-col p-8">
                        <div className="flex items-center gap-3 mb-12">
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-black italic text-xs">Y</div>
                            <span className="font-black italic text-lg">YO STUDIO</span>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto space-y-4">
                            <p className="text-[10px] font-black text-zinc-600 uppercase tracking-widest">Scripts Gerados</p>
                            {messages.filter(m => m.script).map((m, i) => (
                                <div 
                                    key={i}
                                    onClick={() => setViewScript(m.script)}
                                    className="p-4 glass rounded-xl text-[10px] font-bold text-zinc-400 hover:text-white cursor-pointer transition-all border-white/5"
                                >
                                    {m.script.nome}
                                </div>
                            ))}
                        </div>

                        <div className="pt-6 border-t border-white/5 flex items-center gap-3">
                            <div className="w-10 h-10 bg-zinc-800 rounded-full border border-white/10 flex items-center justify-center font-bold text-xs">{username[0]}</div>
                            <div>
                                <p className="text-xs font-black uppercase">{username}</p>
                                <div className="flex items-center gap-1.5">
                                    <div className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                                    <span className="text-[9px] font-bold text-zinc-500 uppercase">Sessão Ativa</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 flex flex-col bg-[#050505] relative">
                        {/* Header */}
                        <div className="h-20 border-b border-white/5 flex items-center px-10 bg-black/20 backdrop-blur-md justify-between">
                            <div className="flex items-center gap-4">
                                <span className="text-[10px] font-black text-zinc-600 uppercase tracking-widest">Terminal</span>
                                <div className="h-1 w-1 bg-zinc-800 rounded-full"></div>
                                <span className="text-[10px] font-bold text-blue-500 uppercase tracking-widest">yo/intelligence/v3</span>
                            </div>
                        </div>

                        {/* Chat */}
                        <div className="flex-1 overflow-y-auto p-10 space-y-8 no-scrollbar">
                            {messages.map((m, i) => (
                                <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[70%] p-6 rounded-3xl ${m.role === 'user' ? 'bg-blue-600 shadow-xl shadow-blue-600/10' : 'glass border-white/10 text-zinc-300'}`}>
                                        <p className="text-sm leading-relaxed">{m.content}</p>
                                        {m.script && (
                                            <button 
                                                onClick={() => setViewScript(m.script)}
                                                className="mt-6 w-full py-4 bg-black/40 rounded-xl border border-white/10 flex items-center justify-center gap-3 text-[10px] font-black uppercase tracking-widest hover:border-blue-500 transition-all"
                                            >
                                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" strokeWidth="3"><path d="M16 18l6-6-6-6M8 6l-6 6 6 6"/></svg>
                                                Visualizar Luau
                                            </button>
                                        )}
                                    </div>
                                </div>
                            ))}
                            {loading && (
                                <div className="flex items-center gap-3 text-blue-500 text-[10px] font-black uppercase tracking-widest">
                                    <div className="w-3 h-3 border-2 border-current border-t-transparent rounded-full animate-spin"></div>
                                    A processar pedido...
                                </div>
                            )}
                            <div ref={chatEndRef} />
                        </div>

                        {/* Input Area */}
                        <div className="p-10">
                            <form onSubmit={sendMessage} className="max-w-4xl mx-auto relative">
                                <input 
                                    className="w-full bg-[#0a0a0a] border border-white/5 rounded-[2rem] px-8 py-7 pr-20 outline-none focus:border-blue-500/50 transition-all text-sm active-input"
                                    placeholder="Descreve o teu script de Roblox..."
                                    value={input}
                                    onChange={e => setInput(e.target.value)}
                                    disabled={loading}
                                />
                                <button className="absolute right-4 top-1/2 -translate-y-1/2 w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center text-white hover:bg-blue-500 transition-all shadow-lg shadow-blue-600/20">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M22 2l-7 20-4-9-9-4 20-7z"/><path d="M22 2L11 13"/></svg>
                                </button>
                            </form>
                        </div>
                    </div>

                    {/* Editor Modal */}
                    {viewScript && (
                        <div className="fixed inset-0 z-50 bg-black/95 backdrop-blur-xl flex items-center justify-center p-12">
                            <div className="w-full max-w-5xl h-full glass rounded-[3rem] overflow-hidden flex flex-col border-white/10 shadow-2xl">
                                <div className="p-8 border-b border-white/5 flex items-center justify-between bg-white/2">
                                    <div>
                                        <h2 className="text-sm font-black uppercase tracking-widest text-white">{viewScript.nome}</h2>
                                        <p className="text-[10px] font-bold text-blue-500 uppercase mt-1">Local: {viewScript.local}</p>
                                    </div>
                                    <div className="flex gap-4">
                                        <button 
                                            onClick={() => {
                                                const el = document.createElement('textarea');
                                                el.value = viewScript.codigo;
                                                document.body.appendChild(el);
                                                el.select();
                                                document.execCommand('copy');
                                                document.body.removeChild(el);
                                            }}
                                            className="px-8 py-4 bg-blue-600 rounded-2xl text-[10px] font-black uppercase shadow-lg shadow-blue-600/20 hover:scale-105 transition-transform"
                                        >
                                            Copiar Script
                                        </button>
                                        <button onClick={() => setViewScript(null)} className="p-4 text-zinc-500 hover:text-white">
                                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
                                        </button>
                                    </div>
                                </div>
                                <div className="flex-1 overflow-auto p-12 bg-black/40 code-area text-blue-100/80 text-sm leading-relaxed">
                                    <pre><code>{viewScript.codigo}</code></pre>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
